name: Deploy to GitHub Pages

# main 에 push 되거나, 파이프라인(Build report archive) 실행이 끝나면 site/ 를 Pages 로 배포.
# ※ archive 의 봇 커밋은 GITHUB_TOKEN 이라 push 트리거를 못 하므로 workflow_run 으로 배포.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Build report archive"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
